<!DOCTYPE html>
<html>
<head>
  <title>Secret Panel 😈</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js"></script>
</head>

<body class="bg-black text-white flex items-center justify-center h-screen">

<div id="loginBox" class="bg-gray-900 p-6 rounded-xl text-center">
  <h1 class="mb-4 text-red-500">🔐 Enter Password</h1>
  <input id="pass" type="password" class="p-2 text-black rounded mb-3">
  <br>
  <button onclick="login()" class="bg-red-500 px-4 py-2 rounded">Enter</button>
</div>

<div id="panel" class="hidden bg-gray-900 p-6 rounded-xl w-96">
  <h1 class="text-red-500 mb-4">💀 Collected Data</h1>
  <div id="list"></div>
</div>

<script>
const PASSWORD = "anshuman123"; // change kar lena

function login() {
  if(pass.value === PASSWORD) {
    loginBox.style.display = "none";
    panel.style.display = "block";
    loadData();
  } else {
    alert("Wrong password!");
  }
}

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB_URL",
  projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function loadData() {
  db.ref("loveData").on("value", (snap) => {
    let data = snap.val();
    let html = "";

    for (let key in data) {
      html += `
        ${data[key].name1} ❤️ ${data[key].name2} 
        (${data[key].score}%)<br>
      `;
    }

    list.innerHTML = html;
  });
}
</script>

</body>
</html>
