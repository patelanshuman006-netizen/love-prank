<!DOCTYPE html>
<html>
<head>
  <title>AI Love Scanner ❤️</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js"></script>
</head>

<body class="bg-gradient-to-r from-pink-500 to-red-500 flex items-center justify-center h-screen">

<div class="bg-white p-6 rounded-2xl text-center w-80 shadow-xl">
  <h1 class="text-xl font-bold mb-4">🤖 AI Love Scanner</h1>

  <input id="name1" placeholder="Your Name" class="border p-2 w-full mb-2 rounded">
  <input id="name2" placeholder="Partner Name" class="border p-2 w-full mb-3 rounded">

  <button onclick="startScan()" class="bg-pink-500 text-white px-4 py-2 rounded">
    Scan Love 💘
  </button>

  <p id="status" class="mt-4 font-semibold"></p>
</div>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB_URL",
  projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function startScan() {
  let n1 = name1.value;
  let n2 = name2.value;

  if(n1 === "" || n2 === "") {
    alert("Enter both names!");
    return;
  }

  status.innerHTML = "🔍 Scanning emotions...";

  setTimeout(() => {
    status.innerHTML = "💓 Analyzing relationship...";

    setTimeout(() => {
      let score = Math.floor(Math.random() * 101);

      // save data
      db.ref("loveData").push({
        name1: n1,
        name2: n2,
        score: score
      });

      status.innerHTML = `
        💀 PRANK HO GYA 💀 <br><br>
        ${n1} ❤️ ${n2} = ${score}% <br><br>
        Data Anshuman ko bhej diya gaya 😈
      `;

    }, 2000);

  }, 2000);
}
</script>

</body>
</html>
